name: atc-communityß
services:
  db:
    image: postgres:15
    container_name: atc_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: atc
      POSTGRES_USER: atc
      POSTGRES_PASSWORD: ${DB_PASSWORD:-atc_password}
    volumes:
      - atc_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "atc"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - atc_net

  redis:
    image: redis:7-alpine
    container_name: atc_redis
    restart: unless-stopped
    volumes:
      - atc_redis:/data
    networks:
      - atc_net

  centrifugo:
    image: centrifugo/centrifugo:v6
    container_name: atc_centrifugo
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CENTRIFUGO_CLIENT_TOKEN_HMAC_SECRET_KEY: ${CENTRIFUGO_TOKEN_HMAC_SECRET}
      CENTRIFUGO_HTTP_API_KEY: ${CENTRIFUGO_API_KEY:-aru-api-key-change-in-production}
    ports:
      - "127.0.0.1:10203:8000"
    volumes:
      - ./centrifugo/config.json:/centrifugo/config.json:ro
    networks:
      - atc_net

  app:
    build: .
    image: atc/app:latest
    container_name: atc_app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      centrifugo:
        condition: service_started
    environment:
      DATABASE_URL: postgres://atc:${DB_PASSWORD:-atc_password}@db:5432/atc
      CENTRIFUGO_URL: http://centrifugo:8000
      CENTRIFUGO_WS_URL: wss://realtime.atc.codegraphics.co.tz/connection/websocket
    volumes:
      - ./media:/app/media
    ports:
      - "127.0.0.1:10204:8000"
    networks:
      - atc_net

networks:
  atc_net:
    driver: bridge

volumes:
  atc_db:
  atc_redis:
