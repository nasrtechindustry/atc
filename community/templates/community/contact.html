{% extends 'community/base.html' %}
{% load static %}
{% block content %}
<div class="container-xxl py-5">
  <div class="container px-lg-5">
    <div class="section-title position-relative text-center mb-5 pb-2 wow fadeInUp" data-wow-delay="0.1s">
      <h2 class="mt-2">Contact Us</h2>
      <p class="text-muted">Have a question or feedback? We'd love to hear from you.</p>
    </div>
    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">{{ message }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
      {% endfor %}
    {% endif %}
    <div class="row g-5">
      <div class="col-lg-8 mx-auto">
        <form method="post" class="p-4 border rounded bg-light shadow">
          {% csrf_token %}
          <div class="mb-3">
            <label for="id_name" class="form-label">Name</label>
            <input type="text" name="name" id="id_name" class="form-control" placeholder="Your Name" required>
          </div>
          <div class="mb-3">
            <label for="id_email" class="form-label">Email</label>
            <input type="email" name="email" id="id_email" class="form-control" placeholder="Your Email" required>
          </div>
          <div class="mb-3">
            <label for="id_subject" class="form-label">Subject</label>
            <input type="text" name="subject" id="id_subject" class="form-control" placeholder="Subject" required>
          </div>
          <div class="mb-3">
            <label for="id_message" class="form-label">Message</label>
            <textarea name="message" id="id_message" class="form-control" rows="5" placeholder="Your Message" required></textarea>
          </div>
          <button type="submit" class="btn btn-primary w-100">Send Message</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
